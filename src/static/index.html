<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codification COICOP</title>
  <style>
    :root {
      --green: #28a745;
      --orange: #fd7e14;
      --red: #dc3545;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --border: #dee2e6;
      --text: #212529;
      --text-muted: #6c757d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    /* Health badge */
    .health {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .health-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .health-dot.ok { background: var(--green); }
    .health-dot.err { background: var(--red); }

    /* API URL */
    .api-url-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .api-url-group label { color: var(--text-muted); white-space: nowrap; }
    .api-url-group input {
      flex: 1;
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Input area */
    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .input-group input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .input-group input:focus { outline: 2px solid #0d6efd; outline-offset: -1px; }
    .input-group button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .input-group button:hover { background: #0b5ed7; }
    .input-group button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.8rem;
    }
    .result-code {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    .result-level {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Confidence bar */
    .confidence-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.3rem;
    }
    .confidence-label {
      min-width: 140px;
      width: auto;
      text-align: right;
      font-size: 0.85rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .confidence-bar-bg {
      flex: 1;
      height: 18px;
      background: #e9ecef;
      border-radius: 4px;
      overflow: hidden;
    }
    .confidence-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .confidence-value {
      width: 50px;
      text-align: right;
      font-size: 0.85rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Level table */
    .levels-title {
      font-weight: 600;
      margin-bottom: 0.6rem;
      font-size: 0.95rem;
    }

    .error-msg {
      color: var(--red);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .level-below-threshold {
      opacity: 0.4;
      text-decoration: line-through;
    }

    .alternative-row {
      font-size: 0.8rem;
      padding-left: 1.5rem;
      opacity: 0.7;
    }
    .alternative-row .confidence-label {
      font-size: 0.8rem;
    }
    .alternative-row .confidence-value {
      font-size: 0.8rem;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Codification COICOP</h1>
    <p class="subtitle">Codification de produits</p>

    <div class="api-url-group">
      <label for="apiUrl">API URL :</label>
      <input type="text" id="apiUrl" value="" placeholder="(meme origine)">
    </div>

    <div class="api-url-group">
      <label for="confidenceThreshold">Seuil de confiance :</label>
      <input type="number" id="confidenceThreshold" value="0" min="0" max="100" step="5" style="width:70px;"> %
    </div>

    <div class="api-url-group">
      <label for="topKInput">Predictions par niveau :</label>
      <input type="number" id="topKInput" value="1" min="1" max="10" step="1" style="width:70px;">
    </div>

    <div class="health" id="healthBadge">
      <span class="health-dot" id="healthDot"></span>
      <span id="healthText">Verification...</span>
    </div>

    <div class="input-group">
      <input type="text" id="productInput" placeholder="Entrez un libelle produit, ex: pain complet bio" autofocus>
      <button id="classifyBtn">Coder</button>
    </div>

    <div id="errorMsg" class="error-msg hidden"></div>

    <div id="resultCard" class="card hidden">
      <div class="result-header">
        <span class="result-code" id="resultCode"></span>
        <span class="result-level" id="resultLevel"></span>
      </div>
      <div id="resultLabel" style="color:var(--text-muted);font-size:0.95rem;margin-bottom:0.6rem;"></div>
      <div class="confidence-row">
        <span class="confidence-label">Confiance</span>
        <div class="confidence-bar-bg">
          <div class="confidence-bar" id="resultBar"></div>
        </div>
        <span class="confidence-value" id="resultConf"></span>
      </div>
    </div>

    <div id="levelsCard" class="card hidden">
      <div class="levels-title">Detail par niveau</div>
      <div id="levelsBody"></div>
    </div>
  </div>

    function coicopLabel(code) { return COICOP_LABELS[code] || ""; }

    var apiUrlInput = document.getElementById("apiUrl");
    var confidenceThreshold = document.getElementById("confidenceThreshold");
    var topKInput = document.getElementById("topKInput");
    var healthDot = document.getElementById("healthDot");
    var healthText = document.getElementById("healthText");
    var productInput = document.getElementById("productInput");
    var classifyBtn = document.getElementById("classifyBtn");
    var errorMsg = document.getElementById("errorMsg");
    var resultCard = document.getElementById("resultCard");
    var resultCode = document.getElementById("resultCode");
    var resultLevel = document.getElementById("resultLevel");
    var resultBar = document.getElementById("resultBar");
    var resultConf = document.getElementById("resultConf");
    var levelsCard = document.getElementById("levelsCard");
    var levelsBody = document.getElementById("levelsBody");

    function getBase() {
      return apiUrlInput.value.replace(/\/+$/, "");
    }

    function confidenceColor(v) {
      if (v > 0.7) return "var(--green)";
      if (v > 0.4) return "var(--orange)";
      return "var(--red)";
    }

    function pct(v) {
      return (v * 100).toFixed(1) + "%";
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove("hidden");
    }

    function hideError() {
      errorMsg.classList.add("hidden");
    }

    /* Health check */
    function checkHealth() {
      healthDot.className = "health-dot";
      healthText.textContent = "Verification...";
      fetch(getBase() + "/health")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === "ok") {
            healthDot.className = "health-dot ok";
            healthText.textContent = "Connecte";
          } else {
            healthDot.className = "health-dot err";
            healthText.textContent = "Modele non charge";
          }
        })
        .catch(function() {
          healthDot.className = "health-dot err";
          healthText.textContent = "Injoignable";
        });
    }

    /* Classify */
    function classify() {
      var text = productInput.value.trim();
      if (!text) return;

      hideError();
      resultCard.classList.add("hidden");
      levelsCard.classList.add("hidden");
      classifyBtn.disabled = true;
      classifyBtn.textContent = "...";

      fetch(getBase() + "/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text, return_all_levels: true, top_k: parseInt(topKInput.value) || 1 })
      })
        .then(function(r) {
          if (!r.ok) throw new Error("Erreur HTTP " + r.status);
          return r.json();
        })
        .then(function(data) {
          var p = data.prediction;
          var threshold = parseFloat(confidenceThreshold.value) / 100 || 0;

          /* Compute cumulative confidence and apply threshold */
          var cumulativeConf = 1;
          var effectiveCode = "";
          var effectiveLevel = "";
          var effectiveCumConf = 1;

          if (p.levels) {
            var keys = Object.keys(p.levels);
            keys.sort();
            keys.forEach(function(lvl) {
              var lp = p.levels[lvl];
              cumulativeConf *= lp.confidence;
              if (effectiveCode === "" || cumulativeConf >= threshold) {
                effectiveCode = lp.code;
                effectiveLevel = lvl;
                effectiveCumConf = cumulativeConf;
              }
            });
          } else {
            cumulativeConf = p.confidence;
            effectiveCode = p.code;
            effectiveLevel = p.final_level;
            effectiveCumConf = p.confidence;
          }

          /* Main result */
          if (threshold > 0 && effectiveCode !== p.code) {
            resultCode.textContent = effectiveCode;
            document.getElementById("resultLabel").textContent = coicopLabel(effectiveCode);
            resultLevel.textContent = "Niveau final : " + effectiveLevel + " (seuil atteint)";
            resultBar.style.width = pct(effectiveCumConf);
            resultBar.style.background = confidenceColor(effectiveCumConf);
            resultConf.textContent = pct(effectiveCumConf);
            resultConf.style.color = confidenceColor(effectiveCumConf);
          } else {
            resultCode.textContent = p.code;
            document.getElementById("resultLabel").textContent = coicopLabel(p.code);
            resultLevel.textContent = "Niveau final : " + p.final_level;
            resultBar.style.width = pct(cumulativeConf);
            resultBar.style.background = confidenceColor(cumulativeConf);
            resultConf.textContent = pct(cumulativeConf);
            resultConf.style.color = confidenceColor(cumulativeConf);
          }
          resultCard.classList.remove("hidden");

          /* Level breakdown */
          if (p.levels) {
            levelsBody.innerHTML = "";
            var keys = Object.keys(p.levels);
            keys.sort();
            var cumConf = 1;
            keys.forEach(function(lvl) {
              var lp = p.levels[lvl];
              cumConf *= lp.confidence;
              var belowThreshold = threshold > 0 && cumConf < threshold;
              var row = document.createElement("div");
              row.className = "confidence-row" + (belowThreshold ? " level-below-threshold" : "");
              row.innerHTML =
                '<span class="confidence-label">' + lvl + " : " + lp.code + (coicopLabel(lp.code) ? " \u2014 " + coicopLabel(lp.code) : "") + '</span>' +
                '<div class="confidence-bar-bg"><div class="confidence-bar" style="width:' +
                pct(lp.confidence) + ";background:" + confidenceColor(lp.confidence) +
                '"></div></div>' +
                '<span class="confidence-value" style="color:' +
                confidenceColor(lp.confidence) + '">' + pct(lp.confidence) + " (cum: " + pct(cumConf) + ")" + "</span>";
              levelsBody.appendChild(row);

              /* Show alternatives if top_k > 1 */
              if (lp.alternatives && lp.alternatives.length > 0) {
                lp.alternatives.forEach(function(alt, idx) {
                  var altRow = document.createElement("div");
                  altRow.className = "confidence-row alternative-row" + (belowThreshold ? " level-below-threshold" : "");
                  altRow.innerHTML =
                    '<span class="confidence-label">' + (idx + 2) + ". " + alt.code + (coicopLabel(alt.code) ? " \u2014 " + coicopLabel(alt.code) : "") + '</span>' +
                    '<div class="confidence-bar-bg"><div class="confidence-bar" style="width:' +
                    pct(alt.confidence) + ";background:" + confidenceColor(alt.confidence) +
                    '"></div></div>' +
                    '<span class="confidence-value" style="color:' +
                    confidenceColor(alt.confidence) + '">' + pct(alt.confidence) + "</span>";
                  levelsBody.appendChild(altRow);
                });
              }
            });
            levelsCard.classList.remove("hidden");
          }
        })
        .catch(function(err) {
          showError(err.message || "Erreur inconnue");
        })
        .finally(function() {
          classifyBtn.disabled = false;
          classifyBtn.textContent = "Classifier";
        });
    }

    classifyBtn.addEventListener("click", classify);
    productInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") classify();
    });
    apiUrlInput.addEventListener("change", checkHealth);

    /* Initial health check */
    checkHealth();
  </script>
