# Secret for MLflow tracking server (train steps only).
# Apply with: kubectl apply -f mlflow-credentials.yaml
# Replace placeholder values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-credentials
  namespace: <YOUR_NAMESPACE>
type: Opaque
stringData:
  MLFLOW_TRACKING_URI: "https://<your-mlflow-server>"
  MLFLOW_TRACKING_USERNAME: "<your-mlflow-username>"
  MLFLOW_TRACKING_PASSWORD: "<your-mlflow-password>"
