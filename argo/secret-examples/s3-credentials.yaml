# Secret for the "travail" S3 bucket (all pipeline steps).
# Apply with: kubectl apply -f s3-credentials.yaml
# Replace placeholder values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: <YOUR_NAMESPACE>
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "<your-access-key-id>"
  AWS_SECRET_ACCESS_KEY: "<your-secret-access-key>"
  AWS_S3_ENDPOINT: "<your-s3-endpoint>"       # e.g. minio.example.com
  AWS_SESSION_TOKEN: ""                         # leave empty if not using STS
